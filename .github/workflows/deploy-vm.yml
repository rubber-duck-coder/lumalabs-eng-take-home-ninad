name: Deploy VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/vm_deploy_key
          chmod 600 ~/.ssh/vm_deploy_key
          printf '%s\n' "${{ secrets.VM_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          VM_SSH_HOST: ${{ secrets.VM_SSH_HOST }}
          VM_SSH_USER: ${{ secrets.VM_SSH_USER }}
          VM_SSH_PORT: ${{ secrets.VM_SSH_PORT || 22 }}
        run: |
          ssh -i ~/.ssh/vm_deploy_key \
            -p "${VM_SSH_PORT}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VM_SSH_USER}@${VM_SSH_HOST}" \
            'bash -s' < scripts/vm-deploy.sh
